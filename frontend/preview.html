<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Lighthouse 数据灯塔 AI - 单文件预览</title>
    <style>
:root {
  color-scheme: light;
  --paper: #ffffff;
  --canvas: #f6f7f8;
  --ink: #050608;
  --text: #1d2228;
  --muted: #7a818a;
  --line: #e4e6e8;
  --line-strong: #cfd3d7;
  --soft: #f0f1f3;
  --teal: #11b7a5;
  --teal-dark: #087d73;
  --blue: #3567e8;
  --amber: #c78422;
  --shadow: 0 18px 42px rgba(26, 30, 34, 0.09);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  background: var(--paper);
}

body {
  margin: 0;
  color: var(--text);
  background: var(--paper);
  font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}

button,
textarea,
input {
  font: inherit;
}

button {
  color: inherit;
}

button:focus-visible,
textarea:focus-visible,
input:focus-visible {
  outline: 3px solid rgba(17, 183, 165, 0.28);
  outline-offset: 2px;
}

.login-page {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: clamp(20px, 4vw, 56px);
  color: #102033;
  background: #ffffff;
}

.login-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.38fr) minmax(360px, 1fr);
  width: min(1440px, 100%);
  min-height: min(760px, calc(100vh - 80px));
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #e8eef5;
  border-radius: 28px;
  box-shadow: 0 30px 80px rgba(47, 125, 240, 0.12);
  animation: loginStageIn 520ms ease both;
}

.login-page.is-authenticating .login-stage {
  animation: loginStageOut 720ms ease both;
}

.login-visual {
  position: relative;
  display: grid;
  min-height: 640px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 48%, rgba(47, 125, 240, 0.13), transparent 26%),
    linear-gradient(135deg, rgba(255, 255, 255, 0.78), transparent 42%),
    #edf6ff;
}

.login-visual-grid {
  position: absolute;
  inset: 0;
  opacity: 0.78;
  background:
    radial-gradient(circle, rgba(47, 125, 240, 0.2) 1.5px, transparent 2px),
    linear-gradient(rgba(143, 164, 189, 0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(143, 164, 189, 0.12) 1px, transparent 1px);
  background-position: 0 0, 0 0, 0 0;
  background-size: 88px 88px, 54px 54px, 54px 54px;
}

.login-brand-lockup,
.login-panel-head {
  display: flex;
  align-items: center;
  gap: 14px;
}

.login-panel-head {
  justify-content: space-between;
}

.login-panel-title {
  display: flex;
  gap: 14px;
  align-items: center;
}

.quick-register-button {
  color: #94a3b8;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 900;
  white-space: nowrap;
}

.quick-register-button:hover {
  color: #2f7df0;
}

.login-brand-lockup {
  position: absolute;
  top: 34px;
  left: 38px;
  z-index: 3;
}

.login-logo,
.login-panel-mark {
  display: grid;
  place-items: center;
  width: 48px;
  height: 48px;
  color: #ffffff;
  background: #2f7df0;
  border-radius: 14px;
  box-shadow: 0 12px 26px rgba(47, 125, 240, 0.28);
}

.login-brand-lockup strong,
.login-panel-head strong {
  display: block;
  color: #102033;
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

.login-brand-lockup small,
.login-panel-head small {
  display: block;
  margin-top: 7px;
  color: #7890ab;
  font-size: 12px;
  font-weight: 800;
}

.login-opportunity-card {
  position: absolute;
  z-index: 4;
  display: grid;
  grid-template-columns: auto auto;
  gap: 5px 12px;
  align-items: end;
  min-width: 210px;
  padding: 16px 18px;
  color: #102033;
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid rgba(213, 227, 244, 0.9);
  border-radius: 6px;
  box-shadow: 0 18px 44px rgba(47, 125, 240, 0.1);
  backdrop-filter: blur(8px);
  animation: floatSignal 5.8s ease-in-out infinite;
}

.login-opportunity-card span {
  grid-column: 1 / -1;
  color: #657d99;
  font-size: 13px;
  font-weight: 900;
}

.login-opportunity-card strong {
  font-size: clamp(28px, 3vw, 44px);
  line-height: 0.95;
  letter-spacing: 0;
}

.login-opportunity-card em {
  color: #2f7df0;
  font-size: 18px;
  font-style: normal;
  font-weight: 900;
}

.card-new {
  top: 122px;
  left: 44px;
}

.card-bid {
  top: 218px;
  right: 42px;
  animation-delay: -1.2s;
}

.card-million {
  bottom: 190px;
  left: 58px;
  animation-delay: -2.4s;
}

.card-billion {
  right: 56px;
  bottom: 184px;
  animation-delay: -3.4s;
}

.radar-stage {
  position: absolute;
  top: 50%;
  left: 50%;
  z-index: 2;
  width: min(360px, 46vw);
  aspect-ratio: 1;
  border-radius: 999px;
  transform: translate(-50%, -48%);
  background:
    radial-gradient(circle, rgba(47, 125, 240, 0.18) 0 4px, transparent 5px),
    radial-gradient(circle, rgba(255, 255, 255, 0.64), rgba(47, 125, 240, 0.11) 66%, transparent 67%);
}

.radar-halo,
.radar-cross,
.radar-scan-beam,
.radar-point {
  position: absolute;
}

.radar-halo {
  inset: var(--inset);
  border: 2px solid rgba(47, 125, 240, 0.12);
  border-radius: 999px;
}

.halo-one {
  --inset: 14%;
}

.halo-two {
  --inset: 28%;
}

.halo-three {
  --inset: 42%;
}

.radar-cross {
  background: rgba(47, 125, 240, 0.15);
}

.cross-x {
  top: 50%;
  right: 8%;
  left: 8%;
  height: 2px;
}

.cross-y {
  top: 8%;
  bottom: 8%;
  left: 50%;
  width: 2px;
}

.radar-scan-beam {
  inset: 50% 50% 0 0;
  background: linear-gradient(40deg, rgba(47, 125, 240, 0.44), transparent 68%);
  transform-origin: 100% 0;
  animation: rotateScan 4.2s linear infinite;
}

.radar-point {
  width: 12px;
  height: 12px;
  background: #2f7df0;
  border-radius: 999px;
  box-shadow: 0 0 0 9px rgba(47, 125, 240, 0.12);
  animation: radarPing 2.6s ease-out infinite;
}

.point-a {
  top: 22%;
  left: 50%;
}

.point-b {
  top: 38%;
  left: 30%;
  animation-delay: -0.6s;
}

.point-c {
  top: 43%;
  right: 27%;
  animation-delay: -1s;
}

.point-d {
  bottom: 26%;
  left: 37%;
  animation-delay: -1.6s;
}

.point-e {
  right: 34%;
  bottom: 21%;
  animation-delay: -2.1s;
}

.login-slogan {
  position: absolute;
  right: 36px;
  bottom: 54px;
  left: 36px;
  z-index: 5;
  text-align: center;
}

.login-slogan h1 {
  display: inline-block;
  margin: 0;
  padding: 8px 18px;
  color: #050608;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 4px;
  font-size: clamp(28px, 3.1vw, 46px);
  line-height: 1.12;
  letter-spacing: 0;
}

.login-slogan p {
  display: inline-block;
  margin: 12px 0 0;
  padding: 6px 14px;
  color: #8fa4bd;
  background: rgba(255, 255, 255, 0.68);
  border-radius: 4px;
  font-size: clamp(16px, 1.5vw, 24px);
  font-weight: 900;
}

.login-panel {
  display: grid;
  align-content: center;
  gap: 42px;
  padding: clamp(34px, 5vw, 78px);
  background: #ffffff;
}

.login-panel-head {
  align-self: end;
}

.login-tabs {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  max-width: 420px;
  padding: 5px;
  background: #f3f7fc;
  border: 1px solid #dce8f6;
  border-radius: 999px;
}

.login-tabs button {
  min-height: 38px;
  color: #6b7d93;
  background: transparent;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 900;
}

.login-tabs button.active {
  color: #102033;
  background: #ffffff;
  box-shadow: 0 8px 20px rgba(47, 125, 240, 0.12);
}

.login-form {
  display: grid;
  gap: 18px;
  max-width: 420px;
}

.wechat-login-panel {
  display: grid;
  justify-items: center;
  gap: 18px;
  max-width: 420px;
  text-align: center;
}

.wechat-orb {
  display: grid;
  place-items: center;
  width: 138px;
  height: 138px;
  background: #eaf4ff;
  border-radius: 999px;
}

.wechat-orb span {
  position: relative;
  width: 64px;
  height: 42px;
  background: #2f7df0;
  border-radius: 999px;
}

.wechat-orb span::before,
.wechat-orb span::after {
  content: "";
  position: absolute;
  background: #ffffff;
  border-radius: 999px;
}

.wechat-orb span::before {
  top: 13px;
  left: 16px;
  width: 8px;
  height: 8px;
  box-shadow: 24px 0 0 #ffffff;
}

.wechat-orb span::after {
  right: -15px;
  bottom: -8px;
  width: 38px;
  height: 29px;
  background: #6ba6f4;
  border: 4px solid #eaf4ff;
}

.wechat-login-panel h2,
.wechat-login-panel p {
  margin: 0;
}

.wechat-login-panel h2 {
  color: #102033;
  font-size: 28px;
}

.wechat-login-panel p {
  color: #7890ab;
  font-weight: 800;
}

.wechat-login-button {
  width: 100%;
  min-height: 52px;
  color: #ffffff;
  background: #2f7df0;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-size: 17px;
  font-weight: 900;
  box-shadow: 0 18px 34px rgba(47, 125, 240, 0.25);
}

.wechat-login-button:disabled {
  cursor: wait;
  opacity: 0.86;
}

.login-agreement {
  justify-content: center;
  text-align: left;
}

.login-form label:not(.remember-line) {
  display: grid;
  gap: 8px;
}

.login-form label > span {
  color: #526b87;
  font-size: 14px;
  font-weight: 900;
}

.login-form input[type="text"],
.login-form input[type="password"],
.login-form input:not([type]) {
  width: 100%;
  min-height: 48px;
  padding: 0 14px;
  color: #102033;
  background: #f8fbff;
  border: 1px solid #dbe7f5;
  border-radius: 8px;
  outline: 0;
}

.login-form input[type="text"]:focus,
.login-form input[type="password"]:focus,
.login-form input:not([type]):focus {
  border-color: #2f7df0;
  box-shadow: 0 0 0 4px rgba(47, 125, 240, 0.12);
}

.login-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  min-height: 28px;
}

.remember-line {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #526b87;
  font-size: 13px;
  font-weight: 800;
}

.remember-line input {
  width: 16px;
  height: 16px;
  accent-color: #2f7df0;
}

.forgot-button {
  color: #2f7df0;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 900;
}

.login-error {
  margin: -4px 0 0;
  color: #c2410c;
  font-size: 13px;
  font-weight: 900;
}

.login-submit {
  position: relative;
  min-height: 52px;
  overflow: hidden;
  color: #ffffff;
  background: #2f7df0;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-size: 17px;
  font-weight: 900;
  box-shadow: 0 18px 34px rgba(47, 125, 240, 0.25);
  transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
}

.login-submit:hover {
  background: #226ce0;
  box-shadow: 0 22px 42px rgba(47, 125, 240, 0.3);
  transform: translateY(-1px);
}

.login-submit:active {
  transform: translateY(0);
}

.login-submit:disabled {
  cursor: wait;
  opacity: 0.86;
}

.login-submit:disabled::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 0 34%, rgba(255, 255, 255, 0.32) 45%, transparent 58% 100%);
  animation: sweep 900ms linear infinite;
}

.register-agent-page {
  align-items: stretch;
  padding: 22px;
}

.agent-register-stage {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 18px;
  width: min(1280px, 100%);
  min-height: min(860px, calc(100vh - 44px));
  margin: auto;
  padding: 22px;
  color: #050608;
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 24px;
  box-shadow: 0 24px 70px rgba(47, 125, 240, 0.1);
}

.agent-register-top,
.agent-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.agent-register-top {
  justify-content: space-between;
}

.agent-brand strong,
.agent-brand small {
  display: block;
}

.agent-brand strong {
  color: #050608;
  font-size: 22px;
  font-weight: 900;
}

.agent-brand small {
  margin-top: 4px;
  color: #8aa1ba;
  font-size: 13px;
  font-weight: 900;
}

.agent-register-top > button {
  min-height: 36px;
  padding: 0 14px;
  color: #4b6178;
  background: #f8fbff;
  border: 1px solid #dbe7f5;
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 900;
}

.agent-register-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  min-height: 0;
  overflow: hidden;
  border: 1px solid #dbe4ef;
  border-radius: 18px;
}

.agent-register-chat {
  display: grid;
  align-content: start;
  gap: 16px;
  min-width: 0;
  overflow-y: auto;
  padding: 24px clamp(22px, 5vw, 74px) 34px;
  background: #ffffff;
}

.agent-register-title {
  margin: 0 0 4px;
  color: #050608;
  font-weight: 900;
}

.agent-message {
  display: grid;
  gap: 10px;
  align-items: start;
}

.agent-message.ai {
  grid-template-columns: 38px minmax(0, 1fr);
}

.agent-message.user {
  grid-template-columns: minmax(0, 260px) auto;
  justify-content: end;
  align-items: center;
}

.agent-avatar {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  color: #2f7df0;
  background: #eef6ff;
  border: 1px solid #d4e7fb;
  border-radius: 999px;
}

.agent-bubble {
  position: relative;
  display: grid;
  gap: 10px;
  max-width: 840px;
  padding: 14px 16px;
  color: #111827;
  background: #ffffff;
  border: 2px solid #6aa6ff;
  border-radius: 10px;
  line-height: 1.72;
}

.agent-message.ai .agent-bubble::before {
  content: "";
  position: absolute;
  top: 18px;
  left: -12px;
  width: 18px;
  height: 18px;
  background: #ffffff;
  border-bottom: 2px solid #6aa6ff;
  border-left: 2px solid #6aa6ff;
  transform: rotate(45deg);
}

.agent-message.user .agent-bubble {
  color: #111827;
  background: #efefef;
  border: 0;
}

.agent-message.user strong {
  font-size: 14px;
  white-space: nowrap;
}

.agent-bubble p {
  margin: 0;
}

.agent-choice-row,
.agent-form-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.agent-choice-row {
  margin-left: 48px;
}

.agent-choice-row button,
.agent-form-actions button,
.agent-city-row button {
  min-height: 38px;
  padding: 0 16px;
  color: #111827;
  background: #e8f2ff;
  border: 1px solid #9cc5f6;
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 900;
}

.agent-choice-row button:last-child,
.agent-form-actions button:last-child {
  background: #f4f6f8;
  border-color: #d7dde5;
}

.agent-form {
  display: grid;
  gap: 12px;
}

.personal-form {
  grid-template-columns: 130px minmax(0, 1fr);
  max-width: 620px;
  overflow: hidden;
  border: 1px solid #111827;
}

.personal-form label {
  display: contents;
}

.personal-form label span,
.personal-form input {
  min-height: 48px;
  padding: 0 12px;
  border-bottom: 1px solid #111827;
}

.personal-form label span {
  display: grid;
  place-items: center;
  background: #f2f2f2;
  border-right: 1px solid #111827;
  font-weight: 900;
}

.personal-form input,
.company-form input,
.preference-onboarding-form select,
.preference-keyword input {
  color: #111827;
  background: #ffffff;
  border: 1px solid #d7dde5;
  border-radius: var(--radius);
}

.personal-form input {
  border-top: 0;
  border-right: 0;
  border-left: 0;
  border-radius: 0;
}

.personal-form .agent-error,
.personal-form .agent-form-actions {
  grid-column: 1 / -1;
  margin: 0;
  padding: 10px 12px;
  border-top: 1px solid #111827;
}

.company-form label {
  display: grid;
  gap: 7px;
}

.company-form label span {
  color: #111827;
  font-weight: 900;
}

.company-form input {
  min-height: 42px;
  padding: 0 12px;
}

.company-suggestions {
  display: grid;
  gap: 8px;
}

.company-suggestions button {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  color: #111827;
  background: #f8fbff;
  border: 1px solid #dbe7f5;
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
}

.company-suggestions span,
.company-empty,
.agent-error {
  color: #7a818a;
  font-size: 13px;
  font-weight: 900;
}

.agent-error {
  color: #b45309;
}

.preference-onboarding-form {
  gap: 0;
}

.agent-pref-section {
  display: grid;
  gap: 14px;
  padding: 18px 0;
  border-top: 1px solid #d7dde5;
}

.agent-pref-section:first-child {
  border-top: 0;
  padding-top: 0;
}

.agent-pref-title {
  display: flex;
  gap: 10px;
  align-items: center;
}

.agent-pref-title strong {
  color: #050608;
  font-size: 18px;
}

.agent-pref-title em {
  padding: 3px 7px;
  color: #7a818a;
  background: #f2f4f7;
  border-radius: 6px;
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
}

.agent-city-row {
  display: grid;
  grid-template-columns: minmax(160px, 210px) minmax(160px, 210px) auto;
  gap: 10px;
  align-items: center;
}

.agent-city-row select {
  min-height: 40px;
  padding: 0 12px;
}

.selected-city-row,
.agent-chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
}

.selected-city-pill,
.agent-chip span {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  padding: 0 13px;
  color: #111827;
  background: #ffffff;
  border: 1px solid #c9ced6;
  border-radius: 9px;
  font-weight: 800;
}

.selected-city-pill {
  position: relative;
  padding-left: 34px;
  border-color: #9cc5f6;
  background: #e8f2ff;
}

.selected-city-pill::before {
  content: "";
  position: absolute;
  left: 12px;
  width: 10px;
  height: 10px;
  background: #2f7df0;
  border-radius: 999px;
  box-shadow: 0 0 0 4px rgba(47, 125, 240, 0.12);
}

.selected-city-pill button {
  position: absolute;
  top: -8px;
  right: -8px;
  display: none;
  place-items: center;
  width: 20px;
  height: 20px;
  padding: 0;
  color: #ffffff;
  background: #111827;
  border: 2px solid #ffffff;
  border-radius: 999px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  font-weight: 900;
}

.selected-city-pill:hover button,
.selected-city-pill:focus-within button {
  display: grid;
}

.agent-chip {
  cursor: pointer;
}

.agent-chip input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.agent-chip input:checked + span {
  background: #e8f2ff;
  border-color: #9cc5f6;
}

.agent-amount {
  grid-template-columns: 220px minmax(0, 1fr);
  margin: 0;
}

.agent-confirm-list {
  display: grid;
  grid-template-columns: 86px minmax(0, 1fr);
  gap: 10px 14px;
  margin: 0;
  padding: 14px;
  background: #f8fbff;
  border: 1px solid #dbe7f5;

  grid-template-columns: auto auto auto auto 30px;

.radar-widget.is-compact span {

  display: grid;
  place-items: center;

  border: 1px solid var(--line);

  background: #f4f5f6;

.radar-panel {
  position: relative;
  display: grid;
  grid-template-columns: 104px minmax(0, 1fr);
  align-items: center;
  gap: 13px;
  min-height: 0;
  padding: 2px 2px 12px;
  overflow: hidden;
  color: var(--text);
  background: transparent;
  border: 0;
  border-radius: 0;
  box-shadow: none;
}

.radar-visual-mini {
  position: relative;
  width: 104px;
  height: 104px;
  overflow: hidden;
  border: 1px solid rgba(18, 21, 25, 0.34);
  border-radius: 999px;
  background:
    linear-gradient(rgba(18, 21, 25, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(18, 21, 25, 0.08) 1px, transparent 1px),
    radial-gradient(circle, rgba(255, 255, 255, 0.96), rgba(232, 234, 236, 0.52) 64%);
  background-size: 26px 26px, 26px 26px, auto;
}

.radar-visual-mini::before {
  content: "";
  position: absolute;
  left: -8px;
  bottom: -10px;
  width: 64px;
  height: 118px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.17), rgba(0, 0, 0, 0.04));
  clip-path: polygon(0 0, 100% 0, 74% 100%, 0 100%);
  transform: rotate(-8deg);
  transform-origin: bottom left;
}

}

.axis-x {
  top: 50%;
  right: 0;
  left: 0;
  height: 1px;
}

.axis-y {
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
}

.radar-sweep-mini {
  position: absolute;
  inset: 50% 50% 0 0;

  animation: rotateScan 3.8s linear infinite;
}

.radar-dot-mini {

  height: 7px;

.dot-a {

}

.dot-b {
  top: 64px;

  box-shadow: 0 0 0 7px rgba(108, 112, 118, 0.1);
}

.dot-c {

  margin: 0;
}

.opportunity-detail-title h1 {
  color: #111827;
  font-size: 24px;
  line-height: 1.25;
}

.opportunity-detail-title p {
  color: #5f6670;
  line-height: 1.65;
}

.detail-dashboard {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.detail-dashboard article {

  border: 1px solid #e1e7ef;

}

.detail-dashboard span {
  color: #667085;
  font-size: 12px;
  font-weight: 900;
}

.detail-dashboard strong {
  color: #111827;
  font-size: 18px;
  line-height: 1.2;
}

.opportunity-ai-insight {
  margin-bottom: 14px;
}

.detail-ai-brief {
  display: grid;
  gap: 14px;
  padding: 18px;
  color: #111827;
  background: #ffffff;
  border: 1px solid #dce4ee;
  border-left: 8px solid #9cccf8;
  border-radius: 8px;
}

.detail-ai-brief-head {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  align-items: baseline;
}

.detail-ai-brief-head strong {
  color: #111827;
  font-size: 20px;
  font-weight: 950;
}

.detail-ai-brief-head span {
  color: #6b7280;
  font-size: 13px;
  font-weight: 900;
}

.detail-ai-brief-body {
  display: grid;
  gap: 10px;
}

.detail-ai-brief-body p {
  margin: 0;
  color: #374151;
  line-height: 1.85;
}

.detail-ai-brief-body b {
  color: #111827;
}

.detail-analysis-entry {
  display: grid;
  gap: 14px;
  padding: 18px;
}

.detail-analysis-entry h2,
.detail-analysis-entry p {
  margin: 0;
}

.detail-analysis-entry p {
  margin-top: 6px;
  color: #6b7280;
  line-height: 1.7;
}

.detail-analysis-buttons {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
}

.detail-analysis-buttons button {
  display: grid;
  gap: 7px;
  min-height: 88px;
  padding: 12px;
  color: #111827;
  text-align: left;
  background: #ffffff;
  border: 1px solid #d8e0ea;
  border-radius: 8px;

}

.detail-analysis-buttons button:hover,
.detail-analysis-buttons button.active {

}

.detail-analysis-buttons strong {
  font-size: 14px;
  font-weight: 950;
}

.detail-analysis-buttons span {
  color: #6b7280;
  font-size: 12px;
  font-weight: 800;
  line-height: 1.5;
}

.detail-analysis-drawer {
  position: sticky;
  top: 18px;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  max-height: calc(100vh - 36px);
  min-height: 620px;
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #d7dde5;
  border-radius: 10px;
  box-shadow: 0 18px 42px rgba(15, 23, 42, 0.12);
}

.detail-analysis-drawer > header {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid #e5e7eb;
}

.detail-analysis-drawer > header span {
  color: #6b7280;
  font-size: 12px;
  font-weight: 900;
}

.detail-analysis-drawer > header h2 {
  margin: 4px 0 0;
  color: #111827;
  font-size: 22px;
}

.detail-analysis-drawer > header button {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  color: #475569;
  background: #f8fafc;
  border: 1px solid #d8dee8;
  border-radius: 999px;
  cursor: pointer;
  font-size: 22px;
  font-weight: 900;
}

.detail-analysis-drawer-body {
  display: grid;
  align-content: start;
  gap: 16px;
  min-height: 0;
  overflow: auto;
  padding: 16px;
  overscroll-behavior: contain;
}

.drawer-ai-summary {
  display: grid;
  gap: 8px;
  padding: 14px 16px;
  background: #f4f7fb;
  border-left: 7px solid #9cccf8;
  border-radius: 8px;
}

.drawer-ai-summary strong {
  color: #111827;
  font-size: 15px;
}

.drawer-ai-summary p {
  margin: 0;
  color: #374151;
  font-weight: 800;
  line-height: 1.75;
}

.analysis-table-section {
  display: grid;
  gap: 10px;
}

.analysis-table-section h3 {
  margin: 0;
  color: #111827;
  font-size: 16px;
}

.analysis-title-with-score {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  align-items: center;
  justify-content: space-between;
}

.analysis-title-with-score b {
  color: #2563eb;
  font-size: 13px;
  font-weight: 950;
}

.analysis-table {
  width: 100%;
  border-collapse: collapse;
  background: #ffffff;
  border: 1px solid #e5e7eb;
}

.analysis-table th,
.analysis-table td {
  padding: 12px 14px;
  border: 1px solid #e5e7eb;
  color: #111827;
  line-height: 1.55;
}

.analysis-table th {
  width: 70%;
  text-align: left;
  font-weight: 950;
  background: #fbfcfe;
}

.analysis-table td {
  width: 30%;
  text-align: center;
  font-weight: 950;
}

.qualification-table td {
  color: #087f5b;
  font-size: 20px;
}

.score-table td {
  color: #374151;
  font-size: 14px;
}

.detail-analysis-drawer .party-chart-grid,
.detail-analysis-drawer .party-chart-grid.four {
  grid-template-columns: 1fr;
}

.detail-analysis-drawer .party-profile-head,
.detail-analysis-drawer .party-stat-strip {
  grid-template-columns: 1fr;
  align-items: start;
}

.detail-analysis-drawer .party-chart-body {
  grid-template-columns: 150px minmax(0, 1fr);
}

.detail-analysis-drawer .party-donut {
  width: 132px;
  height: 132px;
}

.detail-analysis-drawer .relationship-tools {
  position: sticky;
  top: 0;
  z-index: 1;
}

.detail-relationship-graph {
  height: 480px;
}

.detail-section-nav {
  position: sticky;
  top: 58px;
  z-index: 2;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 14px;
  align-items: center;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  backdrop-filter: blur(8px);
}

.detail-section-nav button {
  color: #9ca3af;
  background: transparent;
  border: 0;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-size: 17px;
  font-weight: 950;
  line-height: 1.7;
}

.detail-section-nav button.active {
  color: #111827;
  border-bottom: 3px solid #3b82f6;
}

.detail-section-stack {
  display: grid;
  gap: 14px;
}

.detail-wide-card {
  scroll-margin-top: 126px;
  padding: 18px;
}

.detail-wide-card h2 {
  margin: 0 0 14px;
  color: #111827;
  font-size: 18px;
}

.detail-info-grid {
  display: grid;
  grid-template-columns: 140px minmax(0, 1fr) 140px minmax(0, 1fr);
  margin: 0;
  border: 1px solid #edf0f4;
  border-radius: 6px;
  overflow: hidden;
}

.detail-info-grid dt,
.detail-info-grid dd {
  min-height: 42px;
  margin: 0;
  padding: 10px 12px;
  border-bottom: 1px solid #edf0f4;
}

.detail-info-grid dt {
  color: #6b7280;
  background: #f6f8fb;
  font-weight: 900;
}

.detail-info-grid dd {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  color: #111827;
}

.detail-info-grid button,
.party-analysis button {
  min-height: 28px;
  padding: 0 8px;
  color: #2563eb;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 999px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 900;
}

.detail-analysis-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.detail-analysis-grid article,
.relationship-channel article,
.party-analysis {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 7px;
}

.detail-analysis-grid article {
  display: grid;
  gap: 8px;
  padding: 14px;
}

.detail-analysis-grid strong,
.relationship-channel strong {
  color: #111827;
  font-size: 14px;
}

.detail-analysis-grid span {
  justify-self: start;
  padding: 4px 8px;

  background: #dcfce7;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.detail-analysis-grid p,
.party-analysis p {
  margin: 0;
  color: #5f6670;
  line-height: 1.65;
}

.relationship-channel {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.relationship-channel article {
  display: grid;
  gap: 8px;
  padding: 14px;
}

.relationship-channel em {
  justify-self: start;
  padding: 4px 8px;
  color: #166534;
  background: #e9f8ee;
  border-radius: 999px;
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
}

.relationship-channel span {
  color: #4b5563;
  font-size: 13px;
  line-height: 1.6;
}

.section-ai-note {
  display: inline-flex;
  gap: 10px;
  align-items: center;
  max-width: 100%;
  margin-bottom: 14px;

  color: #ff8a1c;
  background: #fff3e6;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 900;
  line-height: 1.55;
}

.section-ai-note strong {
  color: #111827;
}

.cooperation-analysis-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 18px 28px;
  align-items: start;
}

.cooperation-tagline {
  display: flex;
  justify-content: center;
  gap: 8px;
  align-items: center;
  min-height: 44px;

  background: #f7fbff;
  border: 1px solid #d8e8ff;
  border-radius: 4px;
  font-weight: 950;
}

.cooperation-tagline b {

  border-radius: 4px;
}

}

.cooperation-history h3,
.cooperation-current h3 {

  color: #374151;
  font-size: 16px;
}

.cooperation-current h3 b {
  color: #3b82f6;
}

.cooperation-history article {
  position: relative;
  display: grid;
  grid-template-columns: 82px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  min-height: 34px;
  padding-left: 20px;
  color: #4b5563;
}

.cooperation-history article::before {
  content: "";
  position: absolute;
  left: 0;
  top: 13px;
  width: 8px;
  height: 8px;
  background: #4f83f4;
  border-radius: 999px;
}

.cooperation-history time {
  grid-column: 1;
  color: #6b7280;
  font-weight: 900;
}

.cooperation-history strong {
  min-width: 0;
  font-size: 14px;
}

.cooperation-history em {
  justify-self: start;
  padding: 2px 7px;
  color: #3b82f6;
  background: #eaf2ff;
  border-radius: 2px;
  font-size: 11px;
  font-style: normal;
  font-weight: 900;
}

.cooperation-history span {
  color: #4b5563;
  font-weight: 900;
}

.cooperation-history button {
  justify-self: center;
  color: #3b82f6;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-weight: 900;
}

.party-chart-body.compact {
  grid-template-columns: 210px minmax(0, 1fr);
}

.bid-timeline {
  display: grid;
  gap: 16px;
}

.bid-cycle {
  display: grid;
  gap: 12px;
  padding: 16px;
  background: #ffffff;
  border: 1px solid #e4e8ed;
  border-radius: 7px;
}

.bid-cycle header {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;

  padding: 12px 14px;

  border-radius: 4px;
  font-size: 18px;
  font-weight: 950;
}

.bid-cycle header strong {
  color: #d10000;
}

.bid-cycle p {
  margin: 0;
  color: #667085;
  font-weight: 800;
}

.bid-event {
  display: grid;
  grid-template-columns: 110px 90px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding-left: 16px;
  border-left: 2px solid #e5e7eb;
}

.bid-event time {
  color: #111827;
  font-weight: 950;
}

.bid-event b {
  display: grid;
  place-items: center;
  min-height: 32px;
  color: #3a8b3b;
  background: #eef8ed;
  border: 2px solid #eef8ed;
  font-size: 14px;
}

.bid-event b.soft {
  color: #3a8b3b;
  background: #eef8ed;
  border-color: #eef8ed;
}

.bid-event span {
  color: #333942;

}

.bid-event a {
  color: #3b82f6;
  font-weight: 900;
}

.party-analysis {

  gap: 12px;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
}

.party-stat-card {
  display: grid;
  gap: 18px;
  color: #1f2937;
}

.party-profile-head {
  display: grid;
  grid-template-columns: 74px minmax(0, 1fr) auto;

  align-items: center;

}

.party-profile-head > div:nth-child(2) {
  display: grid;
  gap: 8px;

}

.party-profile-head strong {
  color: #111827;
  font-size: 20px;
}

.party-profile-head button {
  justify-self: start;
  min-height: 28px;
  padding: 0 10px;
  color: #2563eb;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 999px;

  font-size: 12px;
  font-weight: 900;
}

.party-profile-head p,
.party-profile-head small {

}

.party-profile-head a {
  color: #3b82f6;

}

.party-logo-mark {

  border-radius: 999px;
  font-size: 24px;
  font-weight: 950;
}

.party-logo-mark.manager {
  color: #2879a8;
  background: #f5fbff;
  border-color: #5ba8cf;
}

.party-stat-strip {
  display: grid;
  grid-template-columns: 1.2fr repeat(3, minmax(0, 1fr)) auto;
  gap: 16px;

  min-height: 58px;
  padding: 0 18px;
  color: #4f83f4;
  background: linear-gradient(135deg, #f4f8ff 0%, #f7fbff 70%, #eef5ff 100%);
  border: 1px solid #e6edf7;
  border-radius: 6px;
}

.party-stat-strip.manager-strip {
  color: #f05a28;
  background: linear-gradient(135deg, #fff8f5 0%, #fffaf7 70%, #fff3ec 100%);

.party-stat-strip strong,
.party-stat-strip span,
.party-stat-strip button {
  font-weight: 950;
}

.party-stat-strip b {
  margin-left: 7px;
  font-size: 24px;
}

.party-stat-strip button {
  color: currentColor;
  background: transparent;
  border: 0;
  cursor: pointer;
}

.party-summary-line {
  margin: 0;
  padding: 13px 16px;
  color: #344054;
  background: #f7fbff;
  border: 1px solid #d7e7ff;
  border-radius: 4px;
  line-height: 1.7;
  font-weight: 800;
}

.party-summary-line b,
.party-summary-line strong {
  color: #3b82f6;
}

.party-chart-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.party-chart-grid.four {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.party-donut-block {
  display: grid;
  gap: 18px;
  min-height: 290px;
  padding: 20px;
  background: #ffffff;
  border: 1px solid #edf0f4;
  border-radius: 6px;
}

.party-chart-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.party-chart-title strong {
  color: #1f2937;
  font-size: 17px;
}

.party-chart-title span {
  display: inline-grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  color: #98a2b3;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 900;
}

.party-chart-title b,
.party-chart-title i {
  min-width: 52px;
  padding: 7px 10px;

  font-style: normal;

.party-chart-title b {
  color: #4f83f4;
  background: #ffffff;
}

.party-chart-body {
  display: grid;
  grid-template-columns: 210px minmax(0, 1fr);
  gap: 28px;
  align-items: center;
}

.party-donut {
  position: relative;
  display: grid;
  place-items: center;
  width: 170px;
  height: 170px;
  background: conic-gradient(#ffc34d 0 18%, #bfd5ff 18% 34%, #8fb2f5 34% 68%, #a8c3fa 68% 84%, #dce9ff 84% 100%);
  border-radius: 999px;
}

.party-donut::before {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  background: #ffffff;
  border-radius: 999px;
}

.party-donut strong {
  position: relative;
  z-index: 1;
  color: #111827;
  font-size: 20px;

.party-donut-block.orange .party-donut {

  padding: 0;
  list-style: none;
}

.party-donut-block li {

  gap: 14px;
  align-items: center;
  justify-content: space-between;
  color: #5f6670;

  content: "";
  flex: 0 0 auto;
  width: 8px;
  height: 8px;

.party-donut-block li span {
  flex: 1 1 auto;
}

.party-donut-block li b {

.party-donut-block li.highlight span,
.party-donut-block li.highlight b {
  color: #ff8a1c;
  font-weight: 950;

.project-blank-tabs button.active {

.project-blank-main {

.detail-hint-dock span {

.detail-hint-dock i {

.radar-dashboard {

.signal-list {

}

.signal-list article,
.library-list article,
.api-grid article {

}

.signal-list span {

.signal-list strong,
.signal-list p,
.library-list strong,
.library-list span {

.signal-list p {

}

.library-list {

}

.library-list article {

  gap: 12px;
}

.library-list strong {

}

.library-list span {

.knowledge-page {

}

.knowledge-list {

.knowledge-item:hover,

.knowledge-item > span {

.knowledge-item small {

.knowledge-item strong {

.knowledge-item small {

.library-blank-page {

}

.library-blank-head {

.knowledge-actions {

}

.danger-button {

}

.danger-button:hover {

}

.library-blank-canvas {

.library-blank-head p {

.knowledge-upload-toggle {

.knowledge-notice {

.knowledge-upload-form {

.knowledge-upload-form label,

.knowledge-upload-form span,

.knowledge-upload-form input,
.knowledge-upload-form textarea,
.knowledge-toolbar input,
.knowledge-toolbar select,
.knowledge-create-form input,
.knowledge-create-form textarea {

.knowledge-upload-form textarea {

}

.knowledge-create-form textarea {

  line-height: 1.5;
}

.knowledge-upload-summary {

.knowledge-upload-form button,
.knowledge-create-form button {

.knowledge-child-list {

.knowledge-child-list button {

.knowledge-child-list button:hover,
.knowledge-child-list button:focus-visible {

.knowledge-child-list span {

}

.knowledge-child-list strong,
.knowledge-child-list small {

}

.knowledge-child-list strong {

}

.knowledge-child-list small {
  margin-top: 3px;

  color: var(--muted);

}

.knowledge-child-list b {
  color: var(--muted);
  font-size: 12px;
}

.knowledge-toolbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 170px 150px;
  gap: 12px;
  margin-bottom: 14px;
}

.knowledge-toolbar label {
  position: relative;
}

.knowledge-toolbar label .icon {
  position: absolute;
  top: 10px;
  left: 10px;
  color: var(--muted);
}

.knowledge-toolbar input {
  padding-left: 36px;
}

.knowledge-workbench-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 16px;
  align-items: start;
}

.knowledge-document-list {
  display: grid;
  gap: 10px;
  min-width: 0;
}

.knowledge-document-row {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 36px;
  gap: 12px;
  align-items: start;
  padding: 14px;

  border: 1px solid var(--line);
  border-radius: var(--radius);
  cursor: pointer;
}

.knowledge-document-row.active,
.knowledge-document-row:hover,
.knowledge-document-row:focus-visible {
  border-color: var(--ink);
  box-shadow: 0 12px 24px rgba(26, 30, 34, 0.06);
}

.knowledge-document-icon,
.knowledge-preview-head > span {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  color: var(--ink);
  background: #f2f4f6;
  border: 1px solid #d8dde3;
  border-radius: var(--radius);
}

.knowledge-document-title {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.knowledge-document-title strong {
  color: var(--ink);
  font-size: 16px;
}

.knowledge-document-title span {
  padding: 4px 8px;
  color: var(--teal-dark);
  background: rgba(17, 183, 165, 0.1);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.knowledge-document-row p {
  margin: 8px 0 10px;
  color: var(--muted);
  line-height: 1.55;
}

.knowledge-document-meta,
.knowledge-preview-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-items: center;
}

.knowledge-document-meta span,
.knowledge-document-meta em,
.knowledge-preview-tags em,
.knowledge-preview-tags span {
  padding: 4px 7px;
  color: #555d66;
  background: var(--canvas);
  border-radius: 999px;
  font-size: 12px;
  font-style: normal;
  font-weight: 800;
}

.knowledge-document-meta em,
.knowledge-preview-tags em {
  color: #7a5418;
  background: rgba(199, 132, 34, 0.12);
}

.knowledge-document-row > button {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius);
  cursor: pointer;
}

.knowledge-document-row > button:hover {
  color: #a33;
  border-color: #efc5cc;
  background: #fff3f4;
}

.knowledge-preview {
  position: sticky;
  top: 58px;
  display: grid;
  gap: 14px;
  padding: 16px;
  background: #fbfbfc;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.knowledge-preview-head {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.knowledge-preview h2 {
  margin: 0;
  color: var(--ink);
  font-size: 22px;
  line-height: 1.25;
}

.knowledge-preview-list {
  display: grid;
  grid-template-columns: 72px minmax(0, 1fr);
  gap: 8px 10px;
  margin: 0;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.knowledge-preview-list dt {
  color: var(--muted);
  font-weight: 900;
}

.knowledge-preview-list dd {
  min-width: 0;
  margin: 0;
  word-break: break-word;
}

.knowledge-preview > p {
  margin: 0;
  color: var(--muted);
  line-height: 1.7;
}

.knowledge-preview-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.knowledge-muted {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

.preference-page {
  max-width: 1180px;
}

.preference-steps {
  display: grid;
  gap: 14px;
}

.preference-step {
  display: grid;
  gap: 14px;
  padding: 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.preference-step-title {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.preference-step-title > span {
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  color: #111827;
  background: #e8f2ff;
  border: 1px solid #bfd8f6;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.preference-step-title h2,
.preference-step-title p {
  margin: 0;
}

.preference-step-title h2 {
  color: var(--ink);
  font-size: 20px;
}

.preference-step-title p {
  margin-top: 5px;
  color: var(--muted);
  line-height: 1.6;
}

.preference-field-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.preference-field-grid label,
.preference-keyword {
  display: grid;
  gap: 6px;
}

.preference-field-grid span,
.preference-keyword span,
.preference-group > strong,
.preference-amount strong {
  color: #111827;
  font-size: 13px;
  font-weight: 900;
}

.preference-field-grid input,
.preference-field-grid select,
.preference-keyword input {
  min-height: 38px;
  padding: 0 12px;
  color: var(--text);
  background: #fbfdff;
  border: 1px solid #d7dde5;
  border-radius: var(--radius);
}

.preference-field-grid select {
  cursor: pointer;
}

.preference-amount {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 16px;
  align-items: center;
  padding: 12px;
  background: #f8fafc;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.preference-amount span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
}

.preference-amount b {
  color: #111827;
}

.dual-range {
  display: grid;
  gap: 6px;
}

.dual-range input[type="range"] {
  width: 100%;
  accent-color: #72a9e8;
}

.dual-range input[type="range"] + input[type="range"] {
  margin-top: -10px;
}

.amount-range-values {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

.preference-group {
  display: grid;
  grid-template-columns: 110px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.preference-group > div {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.preference-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 30px;
  padding: 0 10px;
  color: #1f2937;
  background: #ffffff;
  border: 1px solid #d7dde5;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.preference-chip input {
  accent-color: #72a9e8;
}

.api-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.api-grid strong,
.api-grid code {
  display: block;
}

.api-grid code,
.code-block,
code {
  color: #223053;
  font-family: "Cascadia Code", Consolas, monospace;
}

.api-grid code {
  margin-top: 8px;
  word-break: break-word;
}

.code-block {
  margin: 16px 0 0;
  padding: 14px;
  overflow: auto;
  background: #f1f3f5;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.runtime-error {
  padding: 30px;
}

@keyframes loginStageIn {
  from {
    opacity: 0;
    transform: translateY(18px) scale(0.985);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes loginStageOut {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  65% {
    opacity: 0.96;
    transform: translateY(-4px) scale(0.995);
  }
  100% {
    opacity: 0;
    transform: translateY(-16px) scale(0.985);
  }
}

@keyframes floatSignal {
  0%,
  100% {
    transform: translate3d(0, 0, 0);
  }
  50% {
    transform: translate3d(0, -10px, 0);
  }
}

@keyframes sweep {
  from {
    transform: translateX(-100%);
  }
  to {
    transform: translateX(100%);
  }
}

@keyframes radarPing {
  0% {
    box-shadow: 0 0 0 0 rgba(17, 183, 165, 0.28);
  }
  70% {
    box-shadow: 0 0 0 11px rgba(17, 183, 165, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(17, 183, 165, 0);
  }
}

@keyframes radarSpin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes radarRing {
  0% {
    opacity: 0.9;
    transform: translate(-50%, -50%) scale(0.68);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.45);
  }
}

@keyframes rotateScan {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 1180px) {
  .login-stage {
    grid-template-columns: 1fr;
    min-height: 0;
  }

  .login-panel {
    order: 1;
    padding: 34px;
  }

  .login-visual {
    order: 2;
    min-height: 520px;
  }

  .login-form {
    max-width: none;
  }

  .card-new {
    top: 96px;
    left: 24px;
  }

  .card-bid {
    top: 150px;
    right: 24px;
  }

  .card-million {
    bottom: 156px;
    left: 28px;
  }

  .card-billion {
    right: 26px;
    bottom: 150px;
  }

  .chat-layout,
  .chat-layout.is-history-thread.has-results,
  .radar-dashboard {
    grid-template-columns: 1fr;
  }

  .hero-copy {
    order: -1;
  }

  .result-rail,
  .conversation-card {
    min-height: 0;
  }

  .cards-grid,
  .api-grid,
  .my-project-grid,
  .project-workspace-layout,
  .project-blank-detail,
  .project-blank-detail.is-hint-closed,
  .knowledge-workbench-grid,
  .knowledge-upload-form {
    grid-template-columns: 1fr;
  }

  .knowledge-preview {
    position: static;
  }

  .knowledge-upload-summary {
    grid-column: auto;
  }

  .watch-summary,
  .project-workspace-tabs {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .watch-tender-item {
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .watch-tender-side {
    grid-column: 2;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
  }

  .my-project-card {
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .my-project-indicators {
    grid-column: 2;

async function request(path, options = {}, fallback) {
  if (!API_BASE_URL) {
    return clone(fallback);
  }

  try {
    const isFormData = typeof FormData !== "undefined" && options.body instanceof FormData;
    const headers = {
      ...(isFormData ? {} : { "Content-Type": "application/json" }),
      ...(options.headers || {})
    };
    const response = await fetch(`${API_BASE_URL}${path}`, {
      ...options,
      headers
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    return response.status === 204 ? null : response.json();
  } catch (error) {
    console.warn(`API fallback for ${path}:`, error);
    return clone(fallback);
  }
}

function clone(value) {

function currentKnowledgeDocuments() {
  const state = getKnowledgeState();
  const deleted = new Set(state.deletedIds || []);
  return [...knowledgeDocuments, ...(state.documents || [])].filter((item) => !deleted.has(item.id));
}

function withCategoryCounts(categories, documents) {
  return categories.map((category) => ({
    ...category,
    document_count: documents.filter((item) => item.category_key === category.key).length
  }));
}

function filterKnowledgeDocuments(filters = {}) {
  const q = String(filters.q || "").trim().toLowerCase();
  return currentKnowledgeDocuments()
    .filter((item) => !filters.category || item.category_key === filters.category)
    .filter((item) => !filters.type || filters.type === "all" || item.type === filters.type)
    .filter((item) => !filters.status || filters.status === "all" || item.status === filters.status)
    .filter((item) => {
      if (!q) return true;
      return [item.title, item.summary, item.source_filename, item.type, ...(item.tags || [])]
        .filter(Boolean)
        .some((value) => String(value).toLowerCase().includes(q));
    })
    .sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));
}

function buildLocalKnowledgeDocument(payload) {
  const now = new Date().toISOString();
  return {
    id: `local-${Date.now()}`,
    category_key: payload.category_key,
    title: payload.title,
    type: payload.type || "资料",
    tags: Array.isArray(payload.tags)
      ? payload.tags
      : String(payload.tags || "")
          .split(/[,，]/)
          .map((item) => item.trim())
          .filter(Boolean),
    summary: payload.summary || "",
    source_filename: payload.source_filename || null,
    stored_path: null,
    file_size: payload.file_size || 0,
    status: payload.status || "ready",
    created_at: now,
    updated_at: now,
    download_url: null
  };
}

function addLocalKnowledgeDocument(payload) {
  const document = buildLocalKnowledgeDocument(payload);
  const state = getKnowledgeState();
  state.documents = [...(state.documents || []), document];
  saveKnowledgeState(state);
  return document;
}

async function getKnowledgeDocuments(filters = {}) {
  const params = new URLSearchParams();
  if (filters.category) params.set("category", filters.category);
  if (filters.q) params.set("q", filters.q);
  if (filters.type && filters.type !== "all") params.set("type", filters.type);
  if (filters.status && filters.status !== "all") params.set("status", filters.status);
  const path = `${ENDPOINTS.knowledgeDocuments}${params.toString() ? `?${params}` : ""}`;
  return request(path, {}, filterKnowledgeDocuments(filters));
}

  if (!API_BASE_URL) return clone(addLocalKnowledgeDocument(payload));
  return request(
    ENDPOINTS.knowledgeDocuments,

      body: JSON.stringify(payload)
    },

  );
}

async function uploadKnowledgeDocument(formData) {
  const file = formData.get("file");
  const payload = {
    category_key: formData.get("category_key"),
    title: formData.get("title") || file?.name || "未命名资料",
    type: formData.get("type") || "上传文件",
    tags: formData.get("tags") || "",
    summary: formData.get("summary") || "",
    source_filename: file?.name || null,
    file_size: file?.size || 0,
    status: formData.get("status") || "ready"
  };
  if (!API_BASE_URL) return clone(addLocalKnowledgeDocument(payload));
  return request(
    ENDPOINTS.knowledgeUpload,
    {
      method: "POST",
      body: formData
    },
    buildLocalKnowledgeDocument(payload)
  );
}

async function deleteKnowledgeDocument(id) {
  if (!API_BASE_URL) {
    const state = getKnowledgeState();
    state.deletedIds = [...new Set([...(state.deletedIds || []), id])];
    state.documents = (state.documents || []).filter((item) => item.id !== id);
    saveKnowledgeState(state);
    return { ok: true };
  }
  return request(`${ENDPOINTS.knowledgeDocuments}/${id}`, { method: "DELETE" }, { ok: true });
}

async function sendChatMessage(content) {
  const normalized = content.replace(/\s/g, "");
  let matches = currentOpportunities();

  if (normalized.includes("重庆")) matches = matches.filter((item) => item.city === "重庆");
  if (normalized.includes("成都")) matches = matches.filter((item) => item.city === "成都");
  if (normalized.includes("学校")) matches = matches.filter((item) => item.industry === "学校");
  if (normalized.includes("医院")) matches = matches.filter((item) => item.industry === "医院");
  if (normalized.includes("到期")) matches = matches.filter((item) => item.type === "即将到期");
  if (normalized.includes("挂网") || normalized.includes("招标")) matches = matches.filter((item) => item.type === "实时招标");

  matches = matches.sort((a, b) => b.match - a.match).slice(0, 3);
  const fallback = {
    reply: matches.length
      ? `已筛出 ${matches.length} 条相关商机，并按匹配度排序。建议先处理靠前项目的报名材料与关键联系人路径。`
      : "暂未找到完全匹配的商机。可以放宽城市、业态或时间条件继续筛选。",
    opportunities: matches
  };

  return request(
    ENDPOINTS.chat,
    {
      method: "POST",
      body: JSON.stringify({ content })
    },
    fallback
  );
}

function buildOpportunityResult(content, opportunities) {
  const normalized = content.replace(/\s/g, "");
  let matches = [...opportunities];

  if (normalized.includes("重庆")) matches = matches.filter((item) => item.city === "重庆");
  if (normalized.includes("成都")) matches = matches.filter((item) => item.city === "成都");
  if (normalized.includes("学校")) matches = matches.filter((item) => item.industry === "学校");
  if (normalized.includes("医院")) matches = matches.filter((item) => item.industry === "医院");
  if (normalized.includes("到期")) matches = matches.filter((item) => item.type === "即将到期");
  if (normalized.includes("挂网") || normalized.includes("招标")) matches = matches.filter((item) => item.type === "实时招标");

  matches = matches.sort((a, b) => b.match - a.match).slice(0, 3);

  return {
    reply: matches.length
      ? `已筛出 ${matches.length} 条相关商机，并按匹配度排序。建议先处理靠前项目的报名材料与关键联系人路径。`
      : "暂未找到完全匹配的商机。可以放宽城市、业态或时间条件继续筛选。",
    opportunities: matches
  };
}

function getBlockedOpportunityRules() {
  try {
    return JSON.parse(localStorage.getItem(BLOCKED_OPPORTUNITIES_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveBlockedOpportunityRules(rules) {
  localStorage.setItem(BLOCKED_OPPORTUNITIES_KEY, JSON.stringify(rules));
}

function getOpportunityBlockValue(item, type) {
  if (type === "project") return item.id;
  if (type === "buyer") return item.buyer || "";
  if (type === "industry") return item.industry || "";
  return "";
}

function isOpportunityBlocked(item, rules = getBlockedOpportunityRules()) {
  return rules.some((rule) => getOpportunityBlockValue(item, rule.type) === rule.value);
}

function splitBlockedOpportunities(list, rules = getBlockedOpportunityRules()) {
  const visible = [];
  const blocked = [];
  list.forEach((item) => {
    if (isOpportunityBlocked(item, rules)) blocked.push(item);
    else visible.push(item);
  });
  return { visible, blocked };
}

function getOpportunityBlockOptions(item) {
  return [
    {
      type: "project",
      label: "仅该项目",
      desc: "只屏蔽当前这一个标讯，不影响其他项目。",
      value: getOpportunityBlockValue(item, "project")
    },
    {
      type: "buyer",
      label: "该招标单位",
      desc: "屏蔽该甲方/代理机构发布的项目，并降低关联单位匹配权重。",
      value: getOpportunityBlockValue(item, "buyer")
    },
    {
      type: "industry",
      label: "该业态",
      desc: "屏蔽同一物业业态标讯，并降低关联单位匹配权重。",
      value: getOpportunityBlockValue(item, "industry")
    }
  ];
}

function blockOpportunityByRule(item, type) {
  const option = getOpportunityBlockOptions(item).find((entry) => entry.type === type);
  if (!option?.value) return;
  const rules = getBlockedOpportunityRules();
  const nextRule = {
    type,
    value: option.value,
    label: option.label,
    sourceTitle: item.title,
    createdAt: new Date().toISOString()
  };
  const nextRules = rules.some((rule) => rule.type === nextRule.type && rule.value === nextRule.value) ? rules : [...rules, nextRule];
  saveBlockedOpportunityRules(nextRules);
}

function bindLoginEvents() {
  document.querySelectorAll("[data-login-mode]").forEach((button) => {
    button.addEventListener("click", () => {
      loginMode = button.dataset.loginMode;
      loginError = "";
      onboardingError = "";
      if (loginMode === "register") onboardingStep = 0;
      render();
    });
  });

  bindOnboardingEvents();
  bindPreferenceAmountRange();

  const wechatButton = document.querySelector("[data-wechat-login]");
  if (wechatButton) {
    wechatButton.addEventListener("click", () => {
      if (loginLoading) return;
      loginError = "";
      loginLoading = true;
      render();

      window.setTimeout(() => {
        showRegisterOnboarding();
      }, 700);
    });
  }

  const form = document.querySelector("#loginForm");
  if (!form) return;

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    if (loginLoading) return;

    loginUsername = String(form.elements.username.value || "").trim();
    loginPassword = String(form.elements.password.value || "").trim();

    if (!loginUsername || !loginPassword) {
      loginError = "请输入用户名和密码";
      render();
      return;
    }

    loginError = "";
    loginLoading = true;
    render();

    window.setTimeout(() => {
      showRegisterOnboarding();
    }, 700);
  });

  const forgotButton = document.querySelector(".forgot-button");
  if (forgotButton) {
    forgotButton.addEventListener("click", () => {
      loginError = "请联系系统管理员重置密码";
      render();
    });
  }
}

function collectOnboardingPreference() {
  const form = document.querySelector("#onboardingPreferenceForm");
  if (!form) return;
  const minInput = form.querySelector("[data-amount-min]");
  const maxInput = form.querySelector("[data-amount-max]");
  onboardingPreference = {
    ...onboardingPreference,
    province: form.elements.province.value,
    city: form.elements.city.value,
    amountMin: minInput ? minInput.value : onboardingPreference.amountMin,
    amountMax: maxInput ? maxInput.value : onboardingPreference.amountMax,
    propertyTypes: [...form.querySelectorAll('[data-onboarding-pref="propertyTypes"]:checked')].map((input) => input.value),
    serviceTypes: [...form.querySelectorAll('[data-onboarding-pref="serviceTypes"]:checked')].map((input) => input.value)
  };
}

function bindOnboardingEvents() {
  document.querySelectorAll("[data-onboarding-start]").forEach((button) => {
    button.addEventListener("click", () => {
      onboardingStep = 1;
      onboardingError = "";
      render();
    });
  });

  document.querySelectorAll("[data-onboarding-skip]").forEach((button) => {
    button.addEventListener("click", () => completeLogin());
  });

  document.querySelectorAll("[data-onboarding-confirm]").forEach((button) => {
    button.addEventListener("click", () => completeLogin());
  });

  document.querySelectorAll("[data-onboarding-prev]").forEach((button) => {
    button.addEventListener("click", () => {
      onboardingStep = Math.max(1, onboardingStep - 1);
      onboardingError = "";
      render();
    });
  });

  document.querySelectorAll("[data-add-onboarding-city]").forEach((button) => {
    button.addEventListener("click", () => {
      const form = document.querySelector("#onboardingPreferenceForm");
      if (!form) return;
      const city = form.elements.city.value;
      if (!onboardingPreference.cities.includes(city)) {
        onboardingPreference = {
          ...onboardingPreference,
          province: form.elements.province.value,
          city,
          cities: [...onboardingPreference.cities, city]
        };
      }
      render();
    });
  });

  document.querySelectorAll("[data-remove-onboarding-city]").forEach((button) => {
    button.addEventListener("click", () => {
      const city = button.dataset.removeOnboardingCity;
      const nextCities = onboardingPreference.cities.filter((item) => item !== city);
      onboardingPreference = {
        ...onboardingPreference,
        cities: nextCities.length ? nextCities : []
      };
      render();
    });
  });

  document.querySelectorAll("[data-company-suggestion]").forEach((button) => {
    button.addEventListener("click", () => {
      onboardingCompany = {
        query: button.dataset.companySuggestion,
        selected: button.dataset.companySuggestion,
        city: button.dataset.companyCity || onboardingCompany.city
      };
      render();
    });
  });

  const personalForm = document.querySelector("#onboardingPersonalForm");
  if (personalForm) {
    personalForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const next = {
        name: String(personalForm.elements.name.value || "").trim(),
        phone: String(personalForm.elements.phone.value || "").trim(),
        code: String(personalForm.elements.code.value || "").trim(),
        email: String(personalForm.elements.email.value || "").trim()
      };
      onboardingProfile = next;
      if (!next.name || !next.phone || !next.code) {
        onboardingError = "请填写姓名、手机号和验证码。";
        render();
        return;
      }
      if (!/^1\d{10}$/.test(next.phone)) {
        onboardingError = "请输入 11 位手机号。";
        render();
        return;
      }
      if (next.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(next.email)) {
        onboardingError = "请输入正确的邮箱格式。";
        render();
        return;
      }
      onboardingError = "";
      onboardingStep = 2;
      render();
    });
  }

  const companyForm = document.querySelector("#onboardingCompanyForm");
  if (companyForm) {
    const input = companyForm.elements.company;
    input.addEventListener("input", () => {
      onboardingCompany = { ...onboardingCompany, query: input.value, selected: "" };
      const list = companyForm.querySelector("[data-company-suggestion-list]");
      if (list) list.innerHTML = renderCompanySuggestionButtons(input.value);
      list?.querySelectorAll("[data-company-suggestion]").forEach((button) => {
        button.addEventListener("click", () => {
          onboardingCompany = {
            query: button.dataset.companySuggestion,
            selected: button.dataset.companySuggestion,
            city: button.dataset.companyCity || onboardingCompany.city
          };
          render();
        });
      });
    });
    companyForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = String(companyForm.elements.company.value || "").trim();
      onboardingCompany = {
        ...onboardingCompany,
        query: value,
        selected: onboardingCompany.selected || value
      };
      if (value.length < 2) {
        onboardingError = "请输入至少 2 个字的企业名称。";
        render();
        return;
      }
      onboardingError = "";
      onboardingStep = 3;
      render();
    });
  }

  const preferenceForm = document.querySelector("#onboardingPreferenceForm");
  if (preferenceForm) {
    preferenceForm.addEventListener("submit", (event) => {
      event.preventDefault();
      collectOnboardingPreference();
      onboardingStep = 4;
      onboardingError = "";
      render();
    });
  }
}

  if (route === "watch") return renderWatchPage(await getWatchTargets());
  if (route === "favorites") return renderMyProjectsPage(await getFavorites());
  if (route === "projectWorkspace") return renderProjectWorkspace(await getOpportunityDetail(selectedOpportunityId));
  if (route === "preferences") return renderOpportunityPreferences();
  if (route === "historyCenter") return renderHistoryCenter(await getConversations());
  if (route === "library") return renderLibrary(await getKnowledgeCategories(), await getKnowledgeDocuments());
  if (route === "libraryDetail") {
    const [sourceCategories, allDocuments, documents] = await Promise.all([
      getKnowledgeCategories(),
      getKnowledgeDocuments(),
      getKnowledgeDocuments({
        category: selectedLibraryKey,
        q: knowledgeSearch,
        type: knowledgeTypeFilter,
        status: knowledgeStatusFilter
      })
    ]);
    const categories = getLibraryCategories(sourceCategories, allDocuments);
    const selectedDocument =
      selectedKnowledgeDocumentId && documents.some((item) => item.id === selectedKnowledgeDocumentId)
        ? await getKnowledgeDocument(selectedKnowledgeDocumentId)
        : documents[0] || null;
    if (selectedDocument) selectedKnowledgeDocumentId = selectedDocument.id;
    return renderLibraryDetail(categories.find((item) => item.key === selectedLibraryKey), documents, selectedDocument, categories);
  }
  if (route === "api") return renderApiContract();
  return renderChat();
}

function getRelationshipTransformStyle() {

function getRelationshipNodeSize(node) {
  return node.tone === "target" ? 112 : 104;
}

function getRelationshipNodeCenter(node) {
  const size = getRelationshipNodeSize(node);
  return {
    x: node.x + size / 2,
    y: node.y + size / 2
  };
}

function getRelationshipPrimaryName(node) {
  if (node.tone === "target") return node.name.replace("目标项目：", "");
  if (!node.role) return node.name;
  const primary = node.name.replace(node.role, "").replace(/^[:：]/, "");
  return primary || node.name;
}

function renderRelationshipEdges(result) {
  const nodeById = new Map(result.nodes.map((node) => [node.id, node]));
  const activeRouteEdges = new Set((result.routeEdges?.[relationshipRouteIndex] || []).map(([from, to]) => `${from}->${to}`));
  return result.edges
    .map((edge) => {
      const from = nodeById.get(edge.from);
      const to = nodeById.get(edge.to);
      if (!from || !to) return "";
      const start = getRelationshipNodeCenter(from);
      const end = getRelationshipNodeCenter(to);
      const labelX = (start.x + end.x) / 2;
      const labelY = (start.y + end.y) / 2 - 8;
      const isMain = activeRouteEdges.has(`${edge.from}->${edge.to}`) || activeRouteEdges.has(`${edge.to}->${edge.from}`);
      return `
        <line x1="${start.x}" y1="${start.y}" x2="${end.x}" y2="${end.y}" class="relationship-edge ${isMain ? "main" : ""}" marker-end="url(#${isMain ? "relationshipArrowRed" : "relationshipArrow"})"></line>
        <text x="${labelX}" y="${labelY}">${edge.relation}</text>
      `;
    })
    .join("");
}

function renderRelationshipNodes(result) {
  return result.nodes
    .map((node) => {
      const label = node.role || node.type;
      return `
        <div class="relationship-node ${node.tone}" style="left: ${node.x}px; top: ${node.y}px;">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(getRelationshipPrimaryName(node))}</strong>
          <em>${escapeHtml(node.type)}</em>
        </div>
      `;
    })
    .join("");
}

  return baseFilters.map(([key, label]) => {
    const count = filterWatchListByKey(list, key).length;
    return {
      key,
      label,
      countNumber: count,
      count: `${count}个`,
      note: key === "result" && count ? `我司中标：${Math.min(count, 5)}个` : ""
    };
  });
}

      <strong>${item.count}</strong>
    </button>
  `;
}

function filterWatchList(list) {
  return filterWatchListByKey(list, watchFilter);
}

function filterWatchListByKey(list, key) {
  if (key === "all") return list;
  return list.filter((item, index) => {
    if (key === "announcement") return index === 0;
    if (key === "signup") return index % 2 === 0;
    if (key === "deposit") return index % 2 === 1;
    if (key === "bid") return true;
    if (key === "result") return index === 0;
    return true;
  });
}

async function renameProject(id) {
  const current = await getOpportunityDetail(id);
  const nextTitle = window.prompt("请输入新的项目名称", current?.title || "");
  if (!nextTitle || !nextTitle.trim()) return;
  await updateOpportunityState(id, { title: nextTitle.trim() });
  render();
}

async function abandonProject(id) {
  const current = await getOpportunityDetail(id);
  const confirmed = window.confirm(`确定放弃跟进“${current?.title || "该项目"}”吗？此项目将从我的项目中移除。`);
  if (!confirmed) return;
  if (current?.favorite) {
    await toggleFavorite(id);
  } else {
    await updateOpportunityState(id, { favorite: false });
  }
  if (selectedOpportunityId === id && route === "opportunity" && detailMode === "project") {
    selectedOpportunityId = "";
    detailMode = "normal";
    route = "favorites";
  }
  render();
}

function formatFileSize(value) {
  const size = Number(value || 0);
  if (!size) return "无附件";
  if (size < 1024) return `${size} B`;
  if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
  return `${(size / 1024 / 1024).toFixed(1)} MB`;
}

function formatDate(value) {
  if (!value) return "-";
  return String(value).slice(0, 10);
}

function normalizeCategory(item) {
  return {
    key: item.key,
    name: item.name,
    description: item.description || item.desc || "",
    document_count: item.document_count || 0,
    sort_order: item.sort_order || 0,
    parent_key: item.parent_key || "",
    isCustomBase: Boolean(item.isCustomBase),
    isCreate: Boolean(item.isCreate)
  };
}

function getKnowledgeLibraryState() {
  try {
    return JSON.parse(localStorage.getItem("DL_KNOWLEDGE_LIBRARY_STATE") || "{\"bases\":[],\"subcategories\":{}}");
  } catch {
    return { bases: [], subcategories: {} };
  }
}

function saveKnowledgeLibraryState(state) {
  localStorage.setItem("DL_KNOWLEDGE_LIBRARY_STATE", JSON.stringify(state));
}

function buildKnowledgeEntryKey(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`;
}

function getLibraryCategories(categories, documents) {
  const state = getKnowledgeLibraryState();
  const fixedBases = categories
    .filter((item) => item.key !== "custom" && !item.parent_key)
    .map(normalizeCategory);
  const customBases = (state.bases || []).map((item, index) =>
    normalizeCategory({
      ...item,
      isCustomBase: true,
      document_count: documents.filter((document) => document.category_key === item.key).length,
      sort_order: 100 + index
    })
  );
  const subcategories = Object.entries(state.subcategories || {}).flatMap(([parentKey, list]) =>
    (list || []).map((item, index) =>
      normalizeCategory({
        ...item,
        parent_key: parentKey,
        document_count: documents.filter((document) => document.category_key === item.key).length,
        sort_order: 1000 + index
      })
    )
  );
  const createEntry = normalizeCategory({
    key: "custom",
    name: "自定义知识库",
    description: "新建一个专属知识库，设置名称和备注后开始沉淀资料。",
    sort_order: 999,
    isCreate: true
  });

  return [...fixedBases, ...customBases, ...subcategories, createEntry].sort((a, b) => a.sort_order - b.sort_order);
}

function getChildKnowledgeCategories(parentKey, categories) {
  return categories.filter((item) => item.parent_key === parentKey);
}

function getParentKnowledgeKey(key) {
  const state = getKnowledgeLibraryState();
  return (
    Object.entries(state.subcategories || {}).find(([, list]) => (list || []).some((item) => item.key === key))?.[0] || ""
  );
}

function createCustomKnowledgeBase(formData) {
  const name = String(formData.get("name") || "").trim();
  if (!name) return null;
  const state = getKnowledgeLibraryState();
  const base = {
    key: buildKnowledgeEntryKey("custom"),
    name,
    description: String(formData.get("description") || "").trim() || "自定义知识库",
    sort_order: 100 + (state.bases || []).length
  };
  state.bases = [...(state.bases || []), base];
  saveKnowledgeLibraryState(state);
  return normalizeCategory({ ...base, isCustomBase: true });
}

function createChildKnowledgeCategory(parentKey, formData) {
  const name = String(formData.get("name") || "").trim();
  if (!name) return null;
  const state = getKnowledgeLibraryState();
  const list = state.subcategories?.[parentKey] || [];
  const child = {
    key: buildKnowledgeEntryKey(`${parentKey}-child`),
    parent_key: parentKey,
    name,
    description: String(formData.get("description") || "").trim() || "二级分类",
    sort_order: list.length + 1
  };
  state.subcategories = { ...(state.subcategories || {}), [parentKey]: [...list, child] };
  saveKnowledgeLibraryState(state);
  return normalizeCategory(child);
}

function deleteCustomKnowledgeBase(key) {
  const state = getKnowledgeLibraryState();
  const exists = (state.bases || []).some((item) => item.key === key);
  if (!exists) return false;
  state.bases = (state.bases || []).filter((item) => item.key !== key);
  const { [key]: _removed, ...restSubcategories } = state.subcategories || {};
  state.subcategories = restSubcategories;
  saveKnowledgeLibraryState(state);
  return true;
}

function deleteChildKnowledgeCategory(key) {
  const parentKey = getParentKnowledgeKey(key);
  if (!parentKey) return "";
  const state = getKnowledgeLibraryState();
  const list = state.subcategories?.[parentKey] || [];
  state.subcategories = {
    ...(state.subcategories || {}),
    [parentKey]: list.filter((item) => item.key !== key)
  };
  saveKnowledgeLibraryState(state);
  return parentKey;
}

function bindPreferenceAmountRange() {
  const minInput = document.querySelector("[data-amount-min]");
  const maxInput = document.querySelector("[data-amount-max]");
  const minLabel = document.querySelector("[data-amount-min-label]");
  const maxLabel = document.querySelector("[data-amount-max-label]");
  if (!minInput || !maxInput || !minLabel || !maxLabel) return;

  const sync = (source) => {
    let minValue = Number(minInput.value);
    let maxValue = Number(maxInput.value);
    if (minValue > maxValue) {
      if (source === "min") {
        maxValue = minValue;
        maxInput.value = String(maxValue);
      } else {
        minValue = maxValue;
        minInput.value = String(minValue);
      }
    }
    minLabel.textContent = String(minValue);
    maxLabel.textContent = String(maxValue);
  };

  minInput.addEventListener("input", () => sync("min"));
  maxInput.addEventListener("input", () => sync("max"));
  sync("min");
}

function clampRelationshipZoom(value) {
  return Math.min(1.8, Math.max(0.6, Number(value.toFixed(2))));
}

function applyRelationshipTransform() {
  const stage = document.querySelector("[data-relationship-stage]");
  if (stage) stage.style.transform = `translate(${relationshipPan.x}px, ${relationshipPan.y}px) scale(${relationshipZoom})`;

  const label = document.querySelector("[data-relationship-zoom-label]");
  if (label) label.textContent = `${Math.round(relationshipZoom * 100)}%`;
}

function updateHistoryTabArrows() {
  const tabs = document.querySelector("[data-history-tabs]");
  const left = document.querySelector('[data-history-tab-scroll="left"]');
  const right = document.querySelector('[data-history-tab-scroll="right"]');
  if (!tabs || !left || !right) return;

  const maxScroll = Math.max(0, tabs.scrollWidth - tabs.clientWidth);
  const current = tabs.scrollLeft;
  const hasOverflow = maxScroll > 2;
  left.hidden = !hasOverflow || current <= 2;
  right.hidden = !hasOverflow || current >= maxScroll - 2;
}

function filterHistoryCenterItems() {
  const input = document.querySelector("#historySearchInput");
  if (!input) return;
  const keyword = input.value.trim().toLowerCase();
  historySearch = input.value;
  const items = Array.from(document.querySelectorAll("[data-history-search]"));
  let visibleCount = 0;
  items.forEach((item) => {
    const matched = !keyword || item.dataset.historySearch.includes(keyword);
    item.hidden = !matched;
    if (matched) visibleCount += 1;
  });
  const empty = document.querySelector("[data-history-empty]");
  if (empty) empty.hidden = visibleCount > 0;
}

function bindHistoryCenterTabs() {
  const tabs = document.querySelector("[data-history-tabs]");
  if (historyTabsResizeHandler) {
    window.removeEventListener("resize", historyTabsResizeHandler);
    historyTabsResizeHandler = null;
  }
  if (!tabs) return;

  updateHistoryTabArrows();
  requestAnimationFrame(updateHistoryTabArrows);
  tabs.addEventListener("scroll", updateHistoryTabArrows, { passive: true });
  historyTabsResizeHandler = updateHistoryTabArrows;
  window.addEventListener("resize", historyTabsResizeHandler);

  document.querySelectorAll("[data-history-tab-scroll]").forEach((button) => {
    button.addEventListener("click", () => {
      const direction = button.dataset.historyTabScroll === "left" ? -1 : 1;
      tabs.scrollBy({ left: direction * Math.round(tabs.clientWidth * 0.72), behavior: "smooth" });
      window.setTimeout(updateHistoryTabArrows, 260);
    });
  });

  document.querySelectorAll("[data-history-skill]").forEach((button) => {
    button.addEventListener("click", () => {
      historySkillFilter = button.dataset.historySkill;
      render();
    });
  });

  const searchInput = document.querySelector("#historySearchInput");
  if (searchInput) {
    searchInput.addEventListener("input", filterHistoryCenterItems);
    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        filterHistoryCenterItems();
      }
    });
  }
}

        panY: relationshipPan.y

          y: start.panY + moveEvent.clientY - start.y
        };

      const handleUp = () => {
        relationshipViewport.classList.remove("is-dragging");
        window.removeEventListener("mousemove", handleMove);

        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        detailActiveSection = visible.target.id;

async function submitChat(rawText) {
  const content = String(rawText || "").trim();
  if (!content) return;

  messages = [...messages, { role: "user", content }];
  draftMessage = "";
  selectedSkillCards = [];
  chatResults = [];
  blockedChatResults = [];
  relationshipResult = null;
  resultMode = "opportunity";
  relationshipZoom = RELATIONSHIP_DEFAULT_ZOOM;
  relationshipPan = { x: 0, y: 0 };
  resultsOpen = false;
  route = "chat";
  saveCurrentThread();
  render();

  const result = await sendChatMessage(content);
  const split = splitBlockedOpportunities(result.opportunities);
  chatResults = split.visible;
  blockedChatResults = split.blocked;
  const totalCount = chatResults.length + blockedChatResults.length;
  const blockedNotice = blockedChatResults.length ? `您有 ${blockedChatResults.length} 个已屏蔽的项目未显示。` : "";
  messages = [
    ...messages,
    {
      role: "assistant",
      content: blockedNotice ? `共找到 ${totalCount} 个项目。${blockedNotice}` : result.reply,
      resultLink: chatResults.length > 0,
      resultLabel: `查看推荐结果（${chatResults.length}）`,
      blockedLink: blockedChatResults.length > 0,
      suggestions: buildSuggestedQuestions(content, chatResults)
    }
  ];
  resultsOpen = false;
  saveCurrentThread();
  render();
}

async function runSkill(label, prompt) {
  if (label && !selectedSkillCards.includes(label)) {
    selectedSkillCards = [...selectedSkillCards, label];
  }
  focusComposer = true;
  saveCurrentThread();
  render();
}

function fillComposer(content) {
  draftMessage = content;
  focusComposer = true;
  render();
}

function buildSuggestedQuestions(content, opportunities) {
  const first = opportunities[0];
  if (first) {
    return [
      `查看${first.title}的关键风险`,
      `分析${first.buyer}的人脉路径`,
      `把${first.title}加入AI盯标`
    ];
  }

  if (content.includes("标书")) {
    return ["解析招标文件", "生成投标文件", "进行标书输出智检"];
  }

  return ["放宽城市重新筛选", "只看学校业态项目", "查找未来六个月到期合同"];
}

function scrollMessages() {
  const stream = document.querySelector("#messageStream");
  if (stream) stream.scrollTop = stream.scrollHeight;
  if (focusComposer) {
    const input = document.querySelector("#chatForm textarea");
    if (input) {
      input.focus();
      input.selectionStart = input.value.length;
      input.selectionEnd = input.value.length;
    }
    focusComposer = false;
  }
}

render().catch((error) => {
  app.innerHTML = `<main class="runtime-error"><h1>页面加载失败</h1><p>${error.message}</p></main>`;
});
